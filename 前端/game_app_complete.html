<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=414, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>游戏APP - 结算完成页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            background-color: #f0f0f0;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #4CAF50;
            width: 414px;
            height: 896px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .top-decoration {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background-color: #C8E6C9;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 80% 100%, 60% 60%, 40% 90%, 20% 50%, 0 80%);
            z-index: 1;
        }
        .bottom-decoration {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background-color: #C8E6C9;
            clip-path: polygon(0 20%, 20% 50%, 40% 10%, 60% 40%, 80% 0%, 100% 30%, 100% 100%, 0 100%);
            z-index: 1;
        }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
            padding: 20px;
        }
        .stars-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .star {
            width: 50px;
            height: 50px;
            position: relative;
        }
        .star-yellow {
            background-color: #FFD700;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .star-gray {
            background-color: #9E9E9E;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .complete-title {
            color: #ffffff;
            font-size: 48px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 4px;
        }
        .cartoon-section {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }
        .rays {
            position: absolute;
            width: 200px;
            height: 200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .ray {
            position: absolute;
            width: 4px;
            height: 40px;
            background-color: #81C784;
            top: 50%;
            left: 50%;
            transform-origin: center bottom;
        }
        .ray:nth-child(1) { transform: translate(-50%, -100%) rotate(0deg); }
        .ray:nth-child(2) { transform: translate(-50%, -100%) rotate(45deg); }
        .ray:nth-child(3) { transform: translate(-50%, -100%) rotate(90deg); }
        .ray:nth-child(4) { transform: translate(-50%, -100%) rotate(135deg); }
        .ray:nth-child(5) { transform: translate(-50%, -100%) rotate(180deg); }
        .ray:nth-child(6) { transform: translate(-50%, -100%) rotate(225deg); }
        .ray:nth-child(7) { transform: translate(-50%, -100%) rotate(270deg); }
        .ray:nth-child(8) { transform: translate(-50%, -100%) rotate(315deg); }
        .cartoon-placeholder {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #FF6B6B 0%, #FFE66D 100%);
            border-radius: 50%;
            position: relative;
            z-index: 3;
        }
        .score-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }
        .score-text {
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        .score-bar {
            background-color: #2E7D32;
            border-radius: 20px;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            clip-path: polygon(0 0, 100% 0, 95% 50%, 100% 100%, 0 100%);
        }
        .gem-icon {
            width: 30px;
            height: 30px;
            background-color: #FF69B4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .score-number {
            color: #ffffff;
            font-size: 32px;
            font-weight: bold;
        }
        .buttons-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding-bottom: 40px;
        }
        .button {
            width: 200px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border: 3px solid #C0C0C0;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .button-blue {
            background-color: #2196F3;
        }
        .button-gray {
            background-color: #757575;
        }
    </style>
</head>
<body>
    <div class="top-decoration"></div>
    <div class="bottom-decoration"></div>
    
    <div class="content">
        <div class="stars-section">
            <div class="star star-yellow"></div>
            <div class="star star-yellow"></div>
            <div class="star star-gray"></div>
        </div>
        
        <div class="complete-title">COMPLETE</div>
        
        <div class="cartoon-section">
            <div class="rays">
                <div class="ray"></div>
                <div class="ray"></div>
                <div class="ray"></div>
                <div class="ray"></div>
                <div class="ray"></div>
                <div class="ray"></div>
                <div class="ray"></div>
                <div class="ray"></div>
            </div>
            <div class="cartoon-placeholder"></div>
        </div>
        
        <div class="score-section">
            <div class="score-text">YOU SCORE</div>
            <div class="score-bar">
                <div class="gem-icon"></div>
                <div class="score-number">32</div>
            </div>
        </div>
        
        <div class="buttons-section">
            <a href="food_app_home.html" class="button button-blue">完成</a>
            <a href="#" class="button button-gray">留念</a>
        </div>
    </div>
</body>
</html>
